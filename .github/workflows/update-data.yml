name: Update public debt data

on:
  schedule:
    # Monthly update on the first day of the month at 04:00 UTC.
    - cron: "0 4 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: update-public-debt-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build datasets
        run: |
          python scripts/build_all_datasets.py

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-debt-quality-report
          path: |
            data/processed/pipeline_run_metadata.json
            data/processed/quality/validation_report.csv
            data/processed/quality/validation_summary.json
          if-no-files-found: ignore

      - name: Commit generated CSV outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update public debt datasets"
            git push
          fi

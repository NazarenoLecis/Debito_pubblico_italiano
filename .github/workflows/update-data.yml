name: Update public debt data

on:
  schedule:
    # Monthly update on the first day of the month at 04:00 UTC.
    - cron: "0 4 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: update-public-debt-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

      - name: Build datasets
        run: |
          python scripts/build_all_datasets.py

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-debt-quality-report
          path: |
            output/data/pipeline_run_metadata.json
            output/data/quality/validation_report.csv
            output/data/quality/validation_report.json
            output/data/quality/validation_summary.json
            output/data/public/debito-pubblico.json
          if-no-files-found: ignore

      - name: Explain publication route
        run: |
          echo "This repository validates and builds the data artifacts."
          echo "The monthly R2 publication is orchestrated by nazarenolecis-data-pipeline."
